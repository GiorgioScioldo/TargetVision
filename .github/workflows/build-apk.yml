name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Compila APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Installa dipendenze npm
        run: npm install

      - name: Aggiungi piattaforma Android se mancante
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizza Capacitor
        run: npx cap sync android

      - name: Build APK debug
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Carica APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: TargetVision-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Crea release con APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: TargetVision Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
